<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: " en" }}">

{%- include head.html -%}

<body>

  <style>
    .nivlab-banner {
      display: block;
      width: 100%;
      height: 310px;
      object-fit: cover;
    }

    @media (max-width: 768px) {
      .nivlab-banner {
        height: 200px;
      }
    }

    @media (max-width: 400px) {
      .nivlab-banner {
        height: 120px;
      }
    }
  </style>

  {% if page.banner %}
  <img src="{{ '/assets/images/projects/' | append: page.banner | relative_url }}" alt="Niv Lab banner"
    class="nivlab-banner">
  {% else %}
  <img src="{{ '/assets/images/projects/resources-header.png' | relative_url }}" alt="Niv Lab banner"
    class="nivlab-banner">
  {% endif %}
  {%- include header.html -%}

  {% if page.library_nav %}
    {% include library-nav.html %}
  {% endif %}
  <div class="py-5">
    <div class="container page-content">
      {{ content }}
    </div>
  </div>

  {%- include footer.html -%}

</body>

</html>
